services:
  - type: web
    name: skinshelf-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_URL
        value: jdbc:postgresql://aws-0-eu-central-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
      - key: DB_USERNAME
        value: postgres.hqlhidqnzprzigmzyuub
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_SECONDS
        value: "604800"
